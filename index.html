<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickFlip - Recommendation System</title>
    <style>
        :root {
            --bg-color: #1e272e;
            --card-bg: #2f3640;
            --accent-color: #ff6b81;
            --text-color: #ffffff;
            --input-bg: #57606f;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90vh;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background-color: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #ff4757;
        }
        .results-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
        }
        .suggestion-item {
            background: #3d4451;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .suggestion-title {
            font-size: 18px;
            font-weight: bold;
        }
        .rating-section {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rating-input {
            width: 70px;
            padding: 3px;
            font-size: 14px;
        }
        .rate-btn {
            width: auto;
            margin-top: 0;
            padding: 4px 10px;
            font-size: 13px;
        }
        .admin-link {
            margin-top: 20px;
            font-size: 12px;
            color: #57606f;
            text-decoration: none;
        }
        .admin-link:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PickFlip 🎬</h1>
        <p style="text-align: center; font-size: 14px; color: #a4b0be;">Find your next watch instantly.</p>
        
        <label for="genreSelect">Choose a Genre:</label>
        <select id="genreSelect">
            <option value="Action">Action</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Comedy">Comedy</option>
        </select>

        <label for="moodSelect">What's your current vibe?</label>
        <select id="moodSelect">
            <option value="Adrenaline">Need an Adrenaline Rush</option>
            <option value="Mind-Bending">Mind-Bending</option>
            <option value="Chill">Just want to Chill</option>
        </select>

        <button id="recommendBtn">Get Recommendations</button>

        <div class="results-box" id="resultsBox" style="display: none;">
            <h3 style="margin-top: 0;">Top Picks For You:</h3>
            <div id="suggestionsContainer"></div>
        </div>
    </div>

    <a href="admin.html" class="admin-link">⚙️ Access Admin Portal</a>

    <script src="app.js"></script>
</body>
</html>
