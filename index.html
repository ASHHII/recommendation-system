<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickFlip - Live Recommendations</title>
    <style>
        /* This is the CSS making your page look modern and clean */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #ff4757; margin-bottom: 5px; }
        p { color: #a4b0be; margin-bottom: 25px; }
        label { display: block; text-align: left; margin: 15px 0 5px; font-weight: bold; color: #ced6e0; }
        select {
            width: 100%;
            padding: 12px;
            background: #2f3542;
            color: white;
            border: 1px solid #57606f;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        button {
            width: 100%;
            background: #ff4757;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s;
        }
        button:hover { background: #e84118; }
        .results-box {
            margin-top: 30px;
            padding: 20px;
            background: #2f3542;
            border-radius: 8px;
            text-align: left;
            display: none; /* Hidden by default until button is clicked */
        }
        .suggestion-item {
            border-left: 4px solid #ff4757;
            padding-left: 15px;
            margin-bottom: 15px;
        }
        .suggestion-item:last-child { margin-bottom: 0; }
        .suggestion-title { font-size: 18px; font-weight: bold; color: #ffffff; }
        .suggestion-meta { font-size: 14px; color: #ff6b81; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PickFlip 🎬</h1>
        <p>Find your next watch or read instantly.</p>

        <!-- Form Dropdowns for User Input -->
        <label for="genreSelect">Choose a Genre:</label>
        <select id="genreSelect">
            <option value="Action">Action</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Comedy">Comedy</option>
        </select>

        <label for="moodSelect">What's your current vibe?</label>
        <select id="moodSelect">
            <option value="Adrenaline">Need an Adrenaline Rush</option>
            <option value="Mind-Bending">Want something Mind-Bending</option>
            <option value="Chill">Just want to Chill</option>
        </select>

        <button id="recommendBtn">Get Recommendations</button>

        <!-- Where the recommendations will appear dynamically -->
        <div class="results-box" id="resultsBox">
            <h3 style="margin-top: 0; color: #ced6e0;">Top Picks For You:</h3>
            <div id="suggestionsContainer"></div>
        </div>
    </div>

    <!-- We will link our logical brain here next -->
    <script src="app.js"></script>
</body>
</html>
